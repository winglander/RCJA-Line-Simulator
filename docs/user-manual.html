<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RCJL Rescue Simulator — User Manual</title>
<style>
  :root { --bg: #0f1724; --fg: #e0e6ed; --accent: #4fc3f7; --heading: #81d4fa;
          --border: #2a3a5c; --code-bg: #1a2332; --table-stripe: #1a2a3e;
          --link: #4fc3f7; --panel: #16213e; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, sans-serif;
         background: var(--bg); color: var(--fg); line-height: 1.7; }
  .container { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }
  /* Headings */
  h1 { color: var(--accent); font-size: 2rem; margin: 0 0 0.5rem; padding-bottom: 0.5rem;
       border-bottom: 2px solid var(--accent); }
  h2 { color: var(--heading); font-size: 1.5rem; margin: 2.5rem 0 1rem;
       padding-bottom: 0.3rem; border-bottom: 1px solid var(--border); }
  h3 { color: var(--accent); font-size: 1.15rem; margin: 1.8rem 0 0.6rem; }
  /* Text */
  p { margin: 0.6rem 0; }
  strong { color: #fff; }
  a { color: var(--link); text-decoration: none; }
  a:hover { text-decoration: underline; }
  hr { border: none; border-top: 1px solid var(--border); margin: 2rem 0; }
  /* Lists */
  ul, ol { padding-left: 1.5rem; margin: 0.5rem 0; }
  li { margin: 0.3rem 0; }
  /* Code */
  code { background: var(--code-bg); color: var(--accent); padding: 0.15em 0.4em;
         border-radius: 3px; font-size: 0.9em; font-family: 'Consolas', 'Monaco', monospace; }
  pre { background: var(--code-bg); border: 1px solid var(--border); border-radius: 6px;
        padding: 1rem; overflow-x: auto; margin: 0.8rem 0; }
  pre code { background: none; padding: 0; color: var(--fg); }
  /* Tables */
  table { width: 100%; border-collapse: collapse; margin: 0.8rem 0; font-size: 0.92rem; }
  th { background: var(--panel); color: var(--accent); text-align: left;
       padding: 0.6rem 0.8rem; border: 1px solid var(--border); font-weight: 600; }
  td { padding: 0.5rem 0.8rem; border: 1px solid var(--border); }
  tr:nth-child(even) { background: var(--table-stripe); }
  /* Images */
  img { max-width: 100%; height: auto; border-radius: 8px;
        border: 1px solid var(--border); margin: 1rem 0; display: block; }
  /* Back link */
  .back-link { display: inline-block; margin-bottom: 1rem; color: var(--accent);
               font-size: 0.9rem; }
  .back-link:hover { text-decoration: underline; }
  /* TOC */
  #toc { background: var(--panel); border: 1px solid var(--border); border-radius: 8px;
         padding: 1rem 1.5rem; margin: 1.5rem 0; }
  #toc summary { color: var(--accent); font-weight: 600; cursor: pointer; font-size: 1.05rem; }
  #toc ul { list-style: none; padding-left: 0; margin-top: 0.5rem; }
  #toc li { margin: 0.3rem 0; }
  #toc a { color: var(--fg); font-size: 0.95rem; }
  #toc a:hover { color: var(--accent); }
  /* Loading */
  .loading { text-align: center; padding: 4rem; color: var(--accent); font-size: 1.2rem; }
</style>
</head>
<body>
<div class="container">
  <a class="back-link" href="../robocup-simulator.html">&larr; Back to Simulator</a>
  <div id="content"><div class="loading">Loading manual...</div></div>
</div>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<script>
(async () => {
  const resp = await fetch('user-manual.md');
  const md = await resp.text();
  const html = marked.parse(md);
  document.getElementById('content').innerHTML = html;

  // Build table of contents from h2 elements
  const headings = document.querySelectorAll('#content h2');
  if (headings.length > 0) {
    const toc = document.createElement('details');
    toc.id = 'toc';
    toc.open = true;
    const summary = document.createElement('summary');
    summary.textContent = 'Table of Contents';
    toc.appendChild(summary);
    const list = document.createElement('ul');
    headings.forEach((h, i) => {
      const id = 'section-' + i;
      h.id = id;
      const li = document.createElement('li');
      const a = document.createElement('a');
      a.href = '#' + id;
      a.textContent = h.textContent;
      li.appendChild(a);
      list.appendChild(li);
    });
    toc.appendChild(list);
    const h1 = document.querySelector('#content h1');
    if (h1) h1.after(toc);
  }

  document.title = document.querySelector('#content h1')?.textContent || document.title;
})();
</script>
</body>
</html>
